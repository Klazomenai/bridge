name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m --build-tags=goolm

      - name: Test
        run: |
          CGO_ENABLED=0 go test -tags goolm \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./internal/...

      - name: Coverage check (per-package thresholds)
        id: coverage_check
        # The override marker `[allow-coverage-drop]` in a PR body bypasses
        # the gate but still surfaces the result for visibility. Useful for
        # deliberate refactors that remove dead code (and thus coverage).
        #
        # `set -o pipefail` is explicit (GitHub Actions enables it by default
        # in the runner shell, but `set +e` doesn't disable pipefail and we
        # want the contract to survive any future runner config drift).
        # Without it, `rc=$?` would capture `tee`'s exit code (always 0) and
        # silently mask gate failures.
        run: |
          set +e
          set -o pipefail
          .github/scripts/check-coverage.sh coverage.out | tee coverage-report.txt
          rc=$?
          set +o pipefail
          if [[ "$rc" -ne 0 ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" ]] \
                && grep -qF '[allow-coverage-drop]' <<< "${{ github.event.pull_request.body }}"; then
              echo "::warning::coverage gate would have failed (rc=$rc) but [allow-coverage-drop] override is set"
              exit 0
            fi
            exit "$rc"
          fi

      - name: Upload coverage profile
        # `if: always()` so the artefact is preserved even when the gate
        # fails, making post-mortem debugging of failing runs possible.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event_name }}-${{ github.sha }}
          path: coverage.out
          retention-days: 30

      - name: Post coverage delta comment
        # Best-effort, not gating. Only runs on PRs. Compares the PR's
        # per-package coverage against the most recent main-branch run; if
        # no main run is available (first-ever run, expired artefact),
        # falls back to a current-only summary.
        #
        # `if: always()` is deliberate — when the gate fails is exactly
        # when "what did I drop?" matters most. Without `always()` this
        # step would skip on gate failure, leaving the user with no
        # delta visibility precisely in the case where they need it.
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/comment-coverage-delta.sh coverage.out

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-licenses
        # Pinned to a specific tag rather than @latest so the audit gate's
        # behaviour stays stable across CI runs. Bump intentionally when
        # we want to adopt newer go-licenses behaviour or fixes.
        run: go install github.com/google/go-licenses@v1.6.0

      - name: License audit (AGPL-compatible deps only)
        # Bridge is AGPL-3.0-or-later. Two-stage gate:
        #
        # 1. `go-licenses check --disallowed_types=forbidden` blocks
        #    proprietary / commercial-only deps.
        #
        # 2. Explicit grep for `GPL-2.0-only` in the report output —
        #    go-licenses classifies GPL-2.0-only as `restricted` (which
        #    we otherwise allow because Bridge is AGPL), but
        #    GPL-2.0-only has no "or-later" upgrade path and is
        #    therefore genuinely incompatible with AGPL-3.0. Catch it
        #    explicitly until / unless go-licenses gains a finer
        #    classification.
        #
        # Restricted licences with upgrade paths (GPL-3.0+, LGPL-3.0+,
        # AGPL-3.0+) remain allowed because Bridge itself is AGPL.
        run: |
          set -o pipefail
          go-licenses check ./... \
            --disallowed_types=forbidden \
            --ignore=$(go list -m | head -1)

          go-licenses report ./... 2>/dev/null > licenses.csv
          if awk -F',' '$3 == "GPL-2.0-only"' licenses.csv | grep -q .; then
            echo "::error::GPL-2.0-only dependency detected (incompatible with AGPL-3.0)"
            awk -F',' '$3 == "GPL-2.0-only"' licenses.csv
            exit 1
          fi
          echo "License audit: $(wc -l < licenses.csv) deps, no incompatible licences"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ghcr.io/klazomenai/bridge:ci-${{ github.sha }} \
            .
