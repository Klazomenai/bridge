name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` / `unlabeled` are added so adding the `allow-coverage-drop`
    # label on a PR with an already-failed run retriggers CI immediately.
    # Without them, the override label would only take effect on the next
    # push (default types are `[opened, synchronize, reopened]`). The other
    # three are listed explicitly because listing any types replaces the
    # default set rather than augmenting it.
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Opt into Node 24 ahead of GitHub's forced migration on 2026-06-02 (Node
# 20 actions removed entirely 2026-09-16). Affected here: actions/checkout,
# actions/setup-go, golangci/golangci-lint-action, actions/cache,
# actions/upload-artifact. Drop this env once those bump to Node-24-native
# versions and we update them deliberately.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m --build-tags=goolm

      - name: Test
        run: |
          CGO_ENABLED=0 go test -tags goolm \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./internal/...

      - name: Coverage check (enforce)
        # Per-package coverage gate. Fails the job if any tracked package
        # falls below its threshold in coverage-thresholds.yaml. The
        # override path lives in the next step.
        #
        # `set -o pipefail` is explicit so the step exits with the script's
        # rc rather than `tee`'s (always 0). The override decision is made
        # by the GHA expression-language `if:` below — bash never sees the
        # override signal, eliminating the PR-body-interpolation class of
        # bug that bit #161.
        if: >-
          github.event_name != 'pull_request' ||
          !contains(github.event.pull_request.labels.*.name, 'allow-coverage-drop')
        run: |
          set -o pipefail
          .github/scripts/check-coverage.sh coverage.out | tee coverage-report.txt

      - name: Coverage check (override warning)
        # Operator override path: PR carries the `allow-coverage-drop`
        # label. The gate still runs and surfaces the result for
        # visibility, but a below-threshold result becomes a warning
        # instead of a failure. The label is RBAC-gated (triage
        # permission), so this override is not self-service for PR
        # authors. Adding/removing the label retriggers CI via the
        # `labeled`/`unlabeled` event types declared above.
        if: >-
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'allow-coverage-drop')
        run: |
          set +e
          set -o pipefail
          .github/scripts/check-coverage.sh coverage.out | tee coverage-report.txt
          rc=$?
          if [[ "$rc" -ne 0 ]]; then
            echo "::warning::coverage gate would have failed (rc=$rc) but allow-coverage-drop label is set"
          fi
          exit 0

      - name: Upload coverage profile
        # `if: always()` so the artefact is preserved even when the gate
        # fails, making post-mortem debugging of failing runs possible.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event_name }}-${{ github.sha }}
          path: coverage.out
          retention-days: 30

      - name: Post coverage delta comment
        # Best-effort, not gating. Only runs on PRs. Compares the PR's
        # per-package coverage against the most recent main-branch run; if
        # no main run is available (first-ever run, expired artefact),
        # falls back to a current-only summary.
        #
        # `if: always()` is deliberate — when the gate fails is exactly
        # when "what did I drop?" matters most. Without `always()` this
        # step would skip on gate failure, leaving the user with no
        # delta visibility precisely in the case where they need it.
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/comment-coverage-delta.sh coverage.out

  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-licenses
        # Pinned to a specific tag rather than @latest so the audit gate's
        # behaviour stays stable across CI runs. Bump intentionally when
        # we want to adopt newer go-licenses behaviour or fixes.
        run: go install github.com/google/go-licenses@v1.6.0

      - name: License audit (AGPL-compatible deps only)
        # Bridge is AGPL-3.0-or-later. Two-stage gate:
        #
        # 1. `go-licenses check --disallowed_types=forbidden` blocks
        #    proprietary / commercial-only deps.
        #
        # 2. Explicit grep for `GPL-2.0-only` in the report output —
        #    go-licenses classifies GPL-2.0-only as `restricted` (which
        #    we otherwise allow because Bridge is AGPL), but
        #    GPL-2.0-only has no "or-later" upgrade path and is
        #    therefore genuinely incompatible with AGPL-3.0. Catch it
        #    explicitly until / unless go-licenses gains a finer
        #    classification.
        #
        # Restricted licences with upgrade paths (GPL-3.0+, LGPL-3.0+,
        # AGPL-3.0+) remain allowed because Bridge itself is AGPL.
        #
        # CGO_ENABLED=0 + -tags=goolm match Bridge's shipped build
        # path. Without them the audit sees CGO-only deps (e.g.
        # go-sqlite3) that aren't in the artifact, and misses deps
        # pulled in under the goolm tag.
        env:
          CGO_ENABLED: '0'
          GOFLAGS: '-tags=goolm'
        run: |
          set -o pipefail

          go-licenses check ./... \
            --disallowed_types=forbidden \
            --ignore=$(go list -m | head -1)

          # Capture stderr so go-licenses diagnostics surface in CI
          # logs whether the step passes or fails. Silencing stderr
          # makes failures un-debuggable.
          if ! go-licenses report ./... 2>licenses-stderr.log > licenses.csv; then
            echo "::error::go-licenses report failed; diagnostics:"
            cat licenses-stderr.log
            exit 1
          fi
          if [ -s licenses-stderr.log ]; then
            echo "go-licenses diagnostics:"
            cat licenses-stderr.log
          fi

          if awk -F',' '$3 == "GPL-2.0-only"' licenses.csv | grep -q .; then
            echo "::error::GPL-2.0-only dependency detected (incompatible with AGPL-3.0)"
            awk -F',' '$3 == "GPL-2.0-only"' licenses.csv
            exit 1
          fi
          echo "License audit: $(wc -l < licenses.csv) deps, no incompatible licences"

  docker:
    runs-on: ubuntu-latest
    needs: [test, license-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ghcr.io/klazomenai/bridge:ci-${{ github.sha }} \
            .
