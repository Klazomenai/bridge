name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m --build-tags=goolm

      - name: Test
        run: |
          CGO_ENABLED=0 go test -tags goolm \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Coverage check
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' \
            | awk '{print $3}' \
            | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          # Fail if below 70%.
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 70) { print "Coverage " c "% < 70% minimum"; exit 1 } }'

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ghcr.io/klazomenai/bridge:ci-${{ github.sha }} \
            .
